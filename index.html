<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#02120c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Waktu Solat">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='23' fill='%23242938'/%3E%3Ccircle cx='48' cy='45' r='28' fill='%23d4af37'/%3E%3Ccircle cx='60' cy='38' r='22' fill='%23242938'/%3E%3Ccircle cx='67' cy='28' r='4.5' fill='%23f3e5ab'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Waktu Solat Malaysia</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,300;0,6..12,400;0,6..12,600;1,6..12,300&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particles-js"></div>
    <div class="box">
        <div class="bism">Waktu Solat</div>
        <h1 id="appTitle">MALAYSIA</h1>
        
        <div class="location-panel">
            <div class="selector-group">
                <label>🏙️ Negeri / Wilayah</label>
                <div class="spinner" id="negeriSpinner">
                    <button class="spinner-btn spinner-up" type="button"></button>
                    <div class="spinner-val">--</div>
                    <button class="spinner-btn spinner-down" type="button"></button>
                </div>
            </div>
            <div class="selector-group">
                <label>📍 Zon Waktu Solat</label>
                <div class="spinner" id="zonSpinner">
                    <button class="spinner-btn spinner-up" type="button"></button>
                    <div class="spinner-val">--</div>
                    <button class="spinner-btn spinner-down" type="button"></button>
                </div>
            </div>
            <div class="theme-picker">
                <label>🎨 Tema Warna</label>
                <div class="theme-swatches" id="themeSwatches">
                    <button class="theme-btn active" data-theme="default" style="background:linear-gradient(135deg,#053b29,#02120c)" title="Sedia Ada"></button>
                    <button class="theme-btn" data-theme="beige" style="background:linear-gradient(135deg,#C4A882,#8B6914)" title="Beige Coffee"></button>
                    <button class="theme-btn" data-theme="blue" style="background:linear-gradient(135deg,#1e3a5f,#0d1b2a)" title="Royal Blue"></button>
                    <button class="theme-btn" data-theme="gold" style="background:linear-gradient(135deg,#8B7535,#4A3F1A)" title="Gold"></button>
                    <button class="theme-btn" data-theme="maroon" style="background:linear-gradient(135deg,#5E1A3A,#2D0D1C)" title="Maroon Royal"></button>
                    <button class="theme-btn" data-theme="purple" style="background:linear-gradient(135deg,#4a1a6b,#1f0d33)" title="Purple Royal"></button>
                    <button class="theme-btn" data-theme="pink" style="background:linear-gradient(135deg,#6b1a4a,#330d1f)" title="Pink Royal"></button>
                    <button class="theme-btn" data-theme="pearl" style="background:linear-gradient(135deg,#F5F0E8,#E8E0D0); border-color:#ccc" title="Pearl Putih"></button>
                    <button class="theme-btn" data-theme="black" style="background:linear-gradient(135deg,#1a1a1a,#000000)" title="Black Immersive"></button>
                    <button class="theme-btn" data-theme="nardo" style="background:linear-gradient(135deg,#6B6F72,#3D4042)" title="Nardo Grey"></button>
                    <button class="theme-btn" data-theme="red" style="background:linear-gradient(135deg,#8B0000,#4A0000)" title="Red Royal"></button>
                    <button class="theme-btn" data-theme="golden" style="background:linear-gradient(135deg,#EFBF04,#8B7003)" title="Golden Yellow"></button>
                    <button class="theme-btn" data-theme="rose" style="background:linear-gradient(135deg,#FF5386,#B8305E)" title="Rose Pink"></button>
                    <button class="theme-btn theme-btn-custom" id="customColorToggle" title="256 Warna"></button>
                </div>
            </div>
        </div>

        <div class="info">
            <div style="display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 12px;">
                <span>📅 TARIKH: <strong id="dt">-</strong></span>
                <span>🌙 HIJRAH: <strong id="dt-hijri" class="hijri-text">-</strong></span>
            </div>
        </div>
        <div class="cd-box">
            <span class="cd-label">Menuju</span>
            <span id="cd-w" class="cd-nama">---</span>
            <span id="cd-t" class="cd-t">00:00:00</span>
        </div>
        <div class="grid" id="gr"></div>
        <div class="ft">
            <div class="ft-affiliate">
                <a href="#" id="hubungiDeveloperLink" target="_blank" rel="noopener" class="ft-link">📧 Hubungi Developer</a>
                <a href="#" id="cadanganLink" target="_blank" rel="noopener" class="ft-link">💡 Cadangan & Sokongan</a>
                <a href="#" id="bioLink" target="_blank" rel="noopener" class="ft-link">🔗 Bio Link (Muamalat)</a>
            </div>
            © 2026 Waktu Solat Malaysia • Data e-Solat JAKIM
        </div>
    </div>

    <button class="fab fab-left" id="downloadPosterBtn" title="Muat Turun Poster">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 1a.5.5 0 0 1 .5.5v6.793l2.146-2.147a.5.5 0 0 1 .708.708l-3 3a.5.5 0 0 1-.708 0l-3-3a.5.5 0 0 1 .708-.708L7.5 8.293V1.5A.5.5 0 0 1 8 1z"/>
            <path d="M1.5 10a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 .5.5h11a.5.5 0 0 0 .5-.5v-2a.5.5 0 0 1 1 0v2A1.5 1.5 0 0 1 13.5 14h-11A1.5 1.5 0 0 1 1 12.5v-2a.5.5 0 0 1 .5-.5z"/>
        </svg>
    </button>

    <button class="fab fab-right" id="shareWaBtn" title="Kongsi WhatsApp">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16">
            <path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c-.003 1.396.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232"/>
        </svg>
    </button>



    <div class="color-popup-overlay" id="colorPopupOverlay">
        <div class="color-popup-panel">
            <div class="color-popup-header">
                <span>🎨 256 Warna</span>
                <button class="color-popup-close" id="colorPopupClose">&times;</button>
            </div>
            <div class="color-popup-grid" id="customColorStrip"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js').catch(function(err) {
            console.warn('SW registration failed:', err);
        });
    }
    </script>
</body>
</html>
